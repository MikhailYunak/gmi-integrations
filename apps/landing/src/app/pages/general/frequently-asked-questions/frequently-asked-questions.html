<div class="frequently-asked-questions-left">
    <h2 uiHeading class="text-green-900 md:w-3/4">
        <span uiHeading variant="italic">Frequently</span>
        Asked Questions
    </h2>
    <h4 uiHeading class="text-green-500">Popular questions about services by «AllSafe.Insure» from our customers.</h4>
</div>

<ui-accordion [multi]="true">
    @for (item of faqs; track item.question; let index = $index) {
    <ui-accordion-item #accordionItem="uiAccordionItem">
        <ui-accordion-header [index]="index" [expanded]="accordionItem.expanded" (click)="accordionItem.toggle()">
            @let icon = accordionItem.expanded ? 'remove' : 'add';
            <div class="flex justify-between items-center gap-x-2">
                <span class="text-lg md:text-xl leading-[112%] md:leading-[108%] font-medium uppercase">{{ item.question }}</span>
                <span class="material-symbols-outlined text-green-500">{{ icon }}</span>
            </div>
        </ui-accordion-header>
        <ui-accordion-body [index]="index">{{ item.answer }}</ui-accordion-body>
    </ui-accordion-item>
    }
</ui-accordion>
