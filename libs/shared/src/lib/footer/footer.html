<footer>
  <div class="flex flex-col items-center gap-y-24 pb-24 lg:items-start">
    <a [routerLink]="['/general']" class="relative w-164 h-38 lg:w-192 lg:h-44 block" aria-label="Go to home page">
      <img class="block" ngSrc="img/logo2.png" alt="Safe Insure" fill priority />
    </a>
    <div class="flex flex-col gap-y-24 w-full lg:flex-row lg:justify-between">
    <nav aria-label="Social media links">
      <ul
        class="flex flex-wrap items-center justify-center gap-x-28 list-none m-0 p-0 lg:justify-start"
        role="list"
      >
        @for (link of _socialLinks; track link.label) {
          <li><ui-link [href]="link.href" [label]="link.label" /></li>
        }
      </ul>
    </nav>
    <div class="flex gap-x-24 lg:gap-x-48 text-green-500">
      <a href="tel:+18003332860">+1 (800) 333–2860</a>
      <a class="lg:uppercase" href="mailto:safeinsure@safeinsure.com">safeinsure@safeinsure.com</a>
    </div>
    </div>
  </div>

  <hr class="border-t border-green-500 m-0" aria-hidden="true" />

  <div class="flex flex-col items-center gap-y-16 pt-24 lg:flex-row lg:justify-between">
    <p class="text-gray-800 text-xxs">© {{ _currentYear }} All Safe Insure. All rights reserved.</p>
    <nav class="text-xxs" aria-label="Legal links">
      <ul
        class="flex flex-wrap items-center justify-center gap-x-8 list-none m-0 p-0 lg:flex-nowrap lg:justify-end"
        role="list"
      >
        @for (link of _legalLinks; track link.label) {
          <li><ui-link [href]="link.href" [label]="link.label" /></li>
        }
      </ul>
    </nav>
  </div>
</footer>
