<div class="reviews-header">
  <div class="flex items-center justify-center gap-x-16 flex-wrap">
    <h2 uiHeading class="text-white">
      Overall <span uiHeading variant="italic">Rating</span> &ndash;
    </h2>
    <div class="rating-badge">
      <span>4.7/5</span>
    </div>
  </div>
</div>

<swiper-container init="false" #swiperEl class="reviews-swiper">
  @for (review of _reviews; track review.name + $index) {
    <swiper-slide>
      <article class="review-card" [attr.aria-label]="'Review by ' + review.name">
        <header class="card-header">
          <img
            [src]="review.avatarSrc"
            [alt]="review.name"
            width="79"
            height="79"
            class="avatar"
            loading="lazy"
          />
          <div class="card-header-info">
            <p class="reviewer-name">{{ review.name }}</p>
            <div class="relative">
              <div class="star-rating" role="img" [attr.aria-label]="review.rating + ' out of 5 stars'">
                <span class="rating-text" aria-hidden="true">{{ review.rating }}/5</span>
                <span class="stars" aria-hidden="true">
                @for (star of _filledStars(review.rating); track star) {
                  <span class="star star--filled">&#9733;</span>
                }
                  @for (star of _emptyStars(review.rating); track star) {
                    <span class="star star--empty">&#9733;</span>
                  }
              </span>
              </div>
            </div>
          </div>
        </header>
        <p class="review-text">{{ review.text }}</p>
        <p class="review-date">{{ review.date }}</p>
      </article>
    </swiper-slide>
  }
</swiper-container>

<div class="reviews-nav" role="group" aria-label="Slider navigation">
  <button
    class="nav-btn"
    type="button"
    (click)="_slidePrev()"
    aria-label="Previous review"
  >
    <span class="material-symbols-outlined" aria-hidden="true">chevron_left</span>
  </button>
  <button
    class="nav-btn"
    type="button"
    (click)="_slideNext()"
    aria-label="Next review"
  >
    <span class="material-symbols-outlined" aria-hidden="true">chevron_right</span>
  </button>
</div>

<div class="reviews-cta">
  <button uiButton="primary">Get Insurance</button>
</div>
