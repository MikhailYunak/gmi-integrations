<div class="ui-form-field">
    @if (label()) {
        <div class="ui-form-field__label-row">
            <label [id]="dropdownId + '-label'" class="ui-form-field__label">
                {{ label() }}@if (required()) {<span class="ui-form-field__required" aria-hidden="true"> *</span>}
            </label>
            @if (tooltip()) {
                <button
                    type="button"
                    class="ui-form-field__tooltip-btn"
                    [title]="tooltip()"
                    [attr.aria-label]="tooltip()"
                >
                    <span class="material-symbols-outlined" aria-hidden="true">help</span>
                </button>
            }
        </div>
    }

    <div class="ui-dropdown-anchor">
        <button
            type="button"
            class="ui-dropdown__trigger"
            [class.is-open]="isOpen()"
            [class.is-focused]="isFocused()"
            [class.is-filled]="isFilled()"
            [class.is-disabled]="isDisabled()"
            [attr.data-hint-state]="hintState()"
            [attr.aria-expanded]="isOpen()"
            aria-haspopup="listbox"
            [attr.aria-labelledby]="label() ? dropdownId + '-label' : null"
            [attr.aria-required]="required() || null"
            [attr.aria-invalid]="hintState() === 'error' || null"
            [attr.aria-describedby]="hint() ? dropdownId + '-hint' : null"
            [disabled]="isDisabled()"
            (click)="toggleDropdown()"
            (focus)="handleTriggerFocus()"
            (blur)="handleTriggerBlur()"
        >
            <span class="ui-dropdown__value" [class.is-placeholder]="!isFilled()">
                {{ isFilled() ? selectedLabel() : placeholder() }}
            </span>
            <span class="material-symbols-outlined ui-dropdown__arrow" aria-hidden="true">expand_more</span>
        </button>

        @if (isOpen()) {
            <div
                class="ui-dropdown__panel"
                role="listbox"
                [attr.aria-labelledby]="label() ? dropdownId + '-label' : null"
            >
            <div class="ui-dropdown__panel-scroll">
                @for (option of options(); track option.value) {
                    <div
                        class="ui-dropdown__option"
                        role="option"
                        [class.is-selected]="selectedValue() === option.value"
                        [attr.aria-selected]="selectedValue() === option.value"
                        (click)="selectOption(option)"
                    >
                        <span class="ui-dropdown__option-label">{{ option.label }}</span>
                        @if (selectedValue() === option.value) {
                            <span class="material-symbols-outlined ui-dropdown__option-check" aria-hidden="true">check</span>
                        }
                    </div>
                }
            </div>
            </div>
        }
    </div>

    @if (hint()) {
        <div
            [id]="dropdownId + '-hint'"
            class="ui-form-field__hint"
            [attr.data-hint-state]="hintState()"
            [attr.role]="hintState() === 'error' ? 'alert' : null"
        >
            <span class="material-symbols-outlined ui-form-field__hint-icon" aria-hidden="true">{{ hintIcon() }}</span>
            {{ hint() }}
        </div>
    }
</div>
