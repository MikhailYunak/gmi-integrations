<label class="ui-radio-card__header" [for]="cardId">
    <input
        type="radio"
        class="ui-radio-card__native"
        [id]="cardId"
        [name]="_name()"
        [checked]="isChecked()"
        [disabled]="isDisabled()"
        [attr.aria-required]="required() || null"
        (change)="select()"
    />
    <span class="ui-radio-card__indicator" aria-hidden="true"></span>
    <span class="ui-radio-card__title">{{ title() }}</span>
</label>

@if (description()) {
    <p class="ui-radio-card__description">{{ description() }}</p>
}

@if (learnMoreUrl()) {
    <a
        class="ui-radio-card__link"
        [href]="learnMoreUrl()"
        (click)="$event.stopPropagation()"
    >{{ learnMoreLabel() }}</a>
}
